<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}OSDeliverIQ - Project Health Intelligence{% endblock %}</title>
    <!-- Modern Premium Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-main: #f4f6fa;
            --bg-sidebar: #0f172a;
            --sidebar-hover: #1e293b;
            --text-main: #334155;
            --text-light: #64748b;
            --text-inverse: #f8fafc;
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --border-color: #e2e8f0;
            --card-bg: #ffffff;
            
            /* Risk Tiers Colors */
            --green: #10b981;
            --green-tint: rgba(16, 185, 129, 0.1);
            --amber: #f59e0b;
            --amber-tint: rgba(245, 158, 11, 0.1);
            --red: #ef4444;
            --red-tint: rgba(239, 68, 68, 0.1);
            
            --radius-sm: 6px;
            --radius-md: 10px;
            --radius-lg: 16px;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.05);
            --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.05), 0 2px 4px -1px rgba(0,0,0,0.03);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.05), 0 4px 6px -2px rgba(0, 0, 0, 0.02);
            
            --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            display: flex;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Sidebar Navigation */
        aside {
            width: 260px;
            background-color: var(--bg-sidebar);
            color: var(--text-inverse);
            display: flex;
            flex-direction: column;
            padding: 24px;
            flex-shrink: 0;
            border-right: 1px solid rgba(255,255,255,0.05);
        }

        aside .logo {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 32px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: #fff;
            text-decoration: none;
        }

        aside .logo span {
            color: var(--primary);
        }

        aside nav {
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex-grow: 1;
        }

        aside nav a {
            color: #94a3b8;
            text-decoration: none;
            padding: 12px 16px;
            border-radius: var(--radius-md);
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: var(--transition);
        }

        aside nav a:hover, aside nav a.active {
            color: #fff;
            background-color: var(--sidebar-hover);
        }

        aside nav a.active {
            background-color: var(--primary);
        }

        /* Main Content Container */
        main {
            flex-grow: 1;
            padding: 40px;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
        }

        .header-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
        }

        .header-section h1 {
            font-size: 28px;
            font-weight: 700;
            color: #0f172a;
            letter-spacing: -0.5px;
        }

        .subtitle {
            font-size: 14px;
            color: var(--text-light);
            margin-top: 4px;
        }

        /* Card System */
        .card {
            background-color: var(--card-bg);
            border-radius: var(--radius-lg);
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow-sm);
            padding: 24px;
            margin-bottom: 24px;
            transition: var(--transition);
        }

        .card:hover {
            box-shadow: var(--shadow-md);
        }

        /* Forms and Buttons */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 10px 18px;
            font-size: 14px;
            font-weight: 600;
            border-radius: var(--radius-md);
            border: none;
            cursor: pointer;
            transition: var(--transition);
            text-decoration: none;
            gap: 8px;
        }

        .btn-primary {
            background-color: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background-color: var(--primary-hover);
        }

        .btn-secondary {
            background-color: #f1f5f9;
            color: var(--text-main);
            border: 1px solid var(--border-color);
        }

        .btn-secondary:hover {
            background-color: #e2e8f0;
        }

        /* Table Styling */
        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th {
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-light);
            padding: 14px 16px;
            border-bottom: 1px solid var(--border-color);
        }

        td {
            padding: 16px;
            border-bottom: 1px solid var(--border-color);
            font-size: 14px;
            vertical-align: middle;
        }

        tr:last-child td {
            border-bottom: none;
        }

        /* Badges */
        .badge {
            display: inline-flex;
            align-items: center;
            padding: 4px 10px;
            font-size: 12px;
            font-weight: 600;
            border-radius: 50px;
            text-transform: uppercase;
        }

        .badge-green {
            background-color: var(--green-tint);
            color: var(--green);
        }

        .badge-amber {
            background-color: var(--amber-tint);
            color: var(--amber);
        }

        .badge-red {
            background-color: var(--red-tint);
            color: var(--red);
        }

        /* Utility classes */
        .text-muted {
            color: var(--text-light);
        }

        .mt-4 { margin-top: 16px; }
        .mb-4 { margin-bottom: 16px; }

        @media (max-width: 768px) {
            body {
                flex-direction: column;
            }
            aside {
                width: 100%;
                border-right: none;
                border-bottom: 1px solid rgba(255,255,255,0.05);
            }
            main {
                padding: 20px;
            }
        }
        {% block extra_css %}{% endblock %}
    </style>
</head>
<body>
    <aside>
        <a href="/" class="logo">OSDeliver<span>IQ</span></a>
        <nav>
            <a href="/" class="{% if request.url.path == '/' %}active{% endif %}">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                Dashboard
            </a>
        </nav>
        <div class="text-muted" style="font-size: 11px; margin-top: auto; padding-top: 20px;">
            OSDeliverIQ v1.0.0
        </div>
    </aside>
    <main>
        {% block content %}{% endblock %}
    </main>
</body>
</html>
