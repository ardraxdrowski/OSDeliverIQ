version: '3.8'

services:
  db:
    image: postgres:15
    container_name: osdeliveriq_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: osdeliveriq
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d osdeliveriq"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: osdeliveriq_app
    restart: always
    ports:
      - "8000:8000"
    volumes:
      - ./src:/app/src
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:password@db:5432/osdeliveriq
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
